<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EM360 — Super Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#302F2F',
            inkSoft: '#3a3938',
            teal: '#38938E',
            tealDeep: '#2c7a76',
            beige: '#F5EEDA',
            beigeDeep: '#EDE4C8',
            orange: '#EFAD1F',
            yellow: '#F8DD16',
          },
          fontFamily: {
            display: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            soft: '0 1px 2px rgba(48,47,47,0.04), 0 8px 24px -12px rgba(48,47,47,0.12)',
            lift: '0 20px 40px -20px rgba(48,47,47,0.2), 0 2px 6px rgba(48,47,47,0.06)',
            ring: '0 0 0 6px rgba(56,147,142,0.12)',
          },
        }
      }
    }
  </script>
  <style>
    html,
    body {
      background: #F5EEDA;
    }

    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-optical-sizing: auto;
    }

    .btn-gradient {
      background: linear-gradient(100deg, #38938E 0%, #38938E 35%, #EFAD1F 80%, #F8DD16 100%);
      background-size: 200% 100%;
      background-position: 0% 0%;
      transition: background-position .5s ease, box-shadow .3s ease, transform .15s ease;
    }

    .btn-gradient:hover {
      background-position: 100% 0%;
    }

    .btn-gradient:active {
      transform: translateY(1px);
    }

    .scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .scrollbar::-webkit-scrollbar-thumb {
      background: rgba(48, 47, 47, .18);
      border-radius: 999px;
    }

    .scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    /* subtle grain */
    .grain::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .035;
      background-image: radial-gradient(#302F2F 1px, transparent 1px);
      background-size: 3px 3px;
    }

    .fade-in {
      animation: fade .4s ease both;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .pulse-dot {
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .4;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    .row-hover:hover {
      background: rgba(56, 147, 142, .05);
    }

    details>summary {
      list-style: none;
      cursor: pointer;
    }

    details>summary::-webkit-details-marker {
      display: none;
    }

    input,
    select,
    textarea {
      font-family: inherit;
    }

    .no-tap {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>

<body class="font-sans text-ink antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
